<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referencia galéria — elrendezések</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bricolage+Grotesque:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#f43f5e;--ink:#0b1424;--muted:rgba(15,26,46,.65)}
body{font-family:'Inter',sans-serif;background:#f4f6fb;color:var(--ink)}

.picker{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;padding:.75rem 1rem;background:rgba(15,15,22,.92);backdrop-filter:blur(14px)}
.picker .title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.95rem;color:#fff;margin-right:.5rem}
.opt{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:inherit;font-size:.8rem;font-weight:500;padding:.45rem .85rem;border-radius:999px;cursor:pointer;transition:all .2s;white-space:nowrap}
.opt:hover{border-color:rgba(255,255,255,.5)}
.opt.active{background:var(--accent);border-color:var(--accent);font-weight:600}

.refs{padding:6.5rem clamp(1.5rem,5vw,4rem) 5rem}
.container{max-width:1280px;margin:0 auto}
.eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-size:.78rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.8rem}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--accent)}
h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-.03em;margin-bottom:.6rem}
h2 .accent{color:var(--accent)}
.lead{color:var(--muted);max-width:600px;margin-bottom:2.5rem;line-height:1.6}

.tile{position:relative;overflow:hidden;border-radius:14px;background:#1a1a22}
.tile img{display:block;width:100%;transition:transform .5s}
.tile:hover img{transform:scale(1.06)}
.meta{position:absolute;left:0;right:0;bottom:0;padding:1rem 1.1rem;color:#fff;background:linear-gradient(180deg,transparent,rgba(11,20,36,.85));transform:translateY(100%);transition:transform .4s}
.tile:hover .meta{transform:translateY(0)}
.meta .t{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem}
.meta .c{font-size:.78rem;opacity:.85;margin-top:.1rem}

/* ===== 1 — EGYSÉGES RÁCS ===== */
.lay-grid .g{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.lay-grid .tile{aspect-ratio:4/3}
.lay-grid .tile img{height:100%;object-fit:cover}

/* ===== 2 — MASONRY (változó magasság) ===== */
.lay-masonry .g{column-count:3;column-gap:1rem}
.lay-masonry .tile{break-inside:avoid;margin-bottom:1rem}
.lay-masonry .tile img{height:auto}

/* ===== 3 — MOZAIK (vegyes méret) ===== */
.lay-mozaik .g{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:190px;gap:1rem}
.lay-mozaik .tile img{height:100%;object-fit:cover}
.lay-mozaik .tile:nth-child(6n+1){grid-column:span 2;grid-row:span 2}
.lay-mozaik .tile:nth-child(6n+4){grid-column:span 2}

/* ===== 4 — KIEMELT + KICSIK ===== */
.lay-featured .g{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:210px;gap:1rem}
.lay-featured .tile img{height:100%;object-fit:cover}
.lay-featured .tile:first-child{grid-column:span 2;grid-row:span 2}

/* ===== 5 — KÁRTYÁK (felirat mindig látszik) ===== */
.lay-cards .g{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.lay-cards .tile{background:#fff;border:1px solid rgba(15,26,46,.08);border-radius:16px;box-shadow:0 2px 10px rgba(15,26,46,.05)}
.lay-cards .tile img{aspect-ratio:4/3;object-fit:cover}
.lay-cards .meta{position:static;transform:none;background:#fff;color:var(--ink)}
.lay-cards .meta .c{color:var(--muted);opacity:1}

/* ===== 6 — VÍZSZINTES CAROUSEL ===== */
.lay-carousel .g{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:1rem}
.lay-carousel .tile{flex:0 0 340px;aspect-ratio:4/3;scroll-snap-align:start}
.lay-carousel .tile img{height:100%;object-fit:cover}

/* ===== 7 — NAGYÍTÓ SÁV (hover-expand) ===== */
.lay-expand .g{display:flex;gap:.6rem;height:440px}
.lay-expand .tile{flex:1;transition:flex .45s cubic-bezier(.4,0,.2,1)}
.lay-expand .tile img{height:100%;object-fit:cover}
.lay-expand .tile:hover{flex:3.5}
.lay-expand .meta{transform:none;opacity:0;transition:opacity .3s}
.lay-expand .tile:hover .meta{opacity:1}

/* ===== 8 — DÖNTÖTT (polaroid) ===== */
.lay-tilt .g{display:grid;grid-template-columns:repeat(3,1fr);gap:1.75rem;padding-top:1rem}
.lay-tilt .tile{background:#fff;border:10px solid #fff;border-bottom-width:30px;border-radius:4px;box-shadow:0 16px 40px rgba(15,26,46,.16);transform:rotate(-2deg);transition:transform .35s;aspect-ratio:4/3}
.lay-tilt .tile:nth-child(even){transform:rotate(2deg)}
.lay-tilt .tile:nth-child(3n){transform:rotate(-1deg)}
.lay-tilt .tile:hover{transform:rotate(0) scale(1.03);z-index:2}
.lay-tilt .tile img{height:100%;object-fit:cover}
.lay-tilt .meta{display:none}

/* ===== LIGHTBOX (kattintásra nagyítás) ===== */
.tile{cursor:zoom-in}
.lb{position:fixed;inset:0;z-index:1000;background:rgba(8,12,20,.9);display:none;align-items:center;justify-content:center;padding:2rem}
.lb.open{display:flex}
.lb img{max-width:92vw;max-height:90vh;border-radius:10px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.lb .x{position:absolute;top:1rem;right:1.25rem;width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.15);color:#fff;border:0;font-size:1.8rem;cursor:pointer}

@media(max-width:820px){
.lay-expand .g{flex-direction:column;height:auto}.lay-expand .tile{height:220px}.lay-expand .tile:hover{flex:1}
.lay-tilt .g{grid-template-columns:1fr 1fr}
.lay-grid .g,.lay-cards .g{grid-template-columns:1fr 1fr}
.lay-masonry .g{column-count:2}
.lay-mozaik .g,.lay-featured .g{grid-template-columns:repeat(2,1fr)}
.lay-featured .tile:first-child,.lay-mozaik .tile:nth-child(6n+1){grid-column:span 2;grid-row:span 2}
}
</style>
</head>
<body>

<div class="picker">
  <div class="title">Galéria elrendezés</div>
  <button class="opt active" data-l="grid">1 · Egységes rács</button>
  <button class="opt" data-l="masonry">2 · Masonry</button>
  <button class="opt" data-l="mozaik">3 · Mozaik</button>
  <button class="opt" data-l="featured">4 · Kiemelt + kicsik</button>
  <button class="opt" data-l="cards">5 · Kártyák</button>
  <button class="opt" data-l="carousel">6 · Carousel</button>
  <button class="opt" data-l="expand">7 · Nagyító sáv</button>
  <button class="opt" data-l="tilt">8 · Döntött</button>
</div>

<section class="refs lay-grid" id="refs">
  <div class="container">
    <div class="eyebrow">Referenciák</div>
    <h2>Munkáink <span class="accent">képeken</span>.</h2>
    <p class="lead">Vidd az egeret a képekre a részletekért. Válts elrendezést a fenti gombokkal.</p>
    <div class="g" id="grid"></div>
  </div>
</section>

<div class="lb" id="lb"><button class="x" id="lbX" aria-label="Bezárás">&times;</button><img id="lbImg" src="" alt=""></div>

<script>
const E="images.html/szinter%20system%20k%C3%A9pek/web/";
const items=[
 ["IMG_7711","Felni — teljes folyamat","Nyers → homokszórt → fekete metál"],
 ["IMG_6164","Versenyfelni — arany metál","Egyedi katalógusszín"],
 ["IMG_7710","Felni — fekete metál","Strukturált bevonat"],
 ["IMG_0407","Ipari tartályok","Nagydarabos munka"],
 ["IMG_1284","Nagy keret — kék","Porfestés"],
 ["IMG_1290","Quad váz — homokszórás után","Festésre előkészítve"],
 ["IMG_0374","Fekete fényes elemek","Sorozatmunka"],
 ["IMG_0377","Perforált tartály — antracit","Porfestés"],
 ["IMG_6347","Alufelni — homokszórás után","Festésre előkészítve"],
 ["IMG_7636","Alufelni — ezüst","Felújítás"],
 ["IMG_7154","Üzemünk belül","Porfestő sor"],
 ["IMG_6963","Kapu — előtte / utána","Kerítéselem"]
];
const grid=document.getElementById('grid');
grid.innerHTML=items.map(([f,t,c])=>`<div class="tile"><img src="${E}${f}.webp" alt="${t}" loading="lazy"><div class="meta"><div class="t">${t}</div><div class="c">${c}</div></div></div>`).join('');
const refs=document.getElementById('refs');
document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.opt').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  refs.className='refs lay-'+b.dataset.l;
}));

/* lightbox */
const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg');
grid.addEventListener('click',e=>{const img=e.target.closest('.tile')?.querySelector('img');if(img){lbImg.src=img.src;lb.classList.add('open');}});
const closeLb=()=>lb.classList.remove('open');
lb.addEventListener('click',closeLb);
document.getElementById('lbX').addEventListener('click',closeLb);
addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
</script>
</body>
</html>
