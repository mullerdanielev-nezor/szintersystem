<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fejléc ötletek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bricolage+Grotesque:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#f43f5e;--accent2:#fb7185;--ink:#0b1424}
body{font-family:'Inter',sans-serif;color:var(--ink)}

.picker{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;padding:.7rem 1rem;background:rgba(15,15,22,.92);backdrop-filter:blur(14px)}
.picker .title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.95rem;color:#fff;margin-right:.5rem}
.opt{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:inherit;font-size:.8rem;font-weight:500;padding:.45rem .85rem;border-radius:999px;cursor:pointer;transition:all .2s;white-space:nowrap}
.opt:hover{border-color:rgba(255,255,255,.5)}
.opt.active{background:var(--accent);border-color:var(--accent);font-weight:600}
.opt-name{margin-left:auto;font-size:.8rem;color:rgba(255,255,255,.6)}.opt-name b{color:#fff}

/* sample hero háttér */
.stage{padding-top:3.2rem}
.hero{position:relative;min-height:100vh;overflow:hidden;display:flex;align-items:center;padding:2rem clamp(1.5rem,5vw,4rem);background:linear-gradient(180deg,#fbfcfe,#eef2f9)}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(color-mix(in srgb,var(--accent) 20%,transparent) 1px,transparent 1px),linear-gradient(90deg,color-mix(in srgb,var(--accent) 20%,transparent) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 60% at 40% 40%,#000,transparent 80%)}
.hero h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);line-height:.95;font-weight:800;letter-spacing:-.03em;position:relative;z-index:1;max-width:600px}
.hero h1 .accent{color:var(--accent)}

/* ===== FEJLÉC alap ===== */
header.site{position:fixed;top:3.2rem;left:0;right:0;z-index:400;transition:all .35s}
.topbar{display:none}
header.site .nav-inner{max-width:1280px;margin:0 auto;padding:1rem clamp(1.5rem,5vw,4rem);display:flex;align-items:center;gap:2rem}
header.site .brand{display:flex;align-items:center;height:38px;line-height:0}
header.site .brand img{height:100%;width:auto;display:block;transition:filter .3s}
header.site .menu{display:flex;align-items:center;gap:1.9rem;margin-left:auto}
header.site .menu a{position:relative;color:rgba(15,26,46,.8);text-decoration:none;font-size:.92rem;font-weight:500}
header.site .menu a:hover{color:var(--accent)}
header.site .nav-cta{background:var(--accent);color:#fff;padding:.6rem 1.2rem;border-radius:999px;font-weight:600;font-size:.85rem;text-decoration:none;white-space:nowrap}

/* 1 — FROSTED (jelenlegi) */
.v-frosted{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);box-shadow:0 6px 28px rgba(15,26,46,.09)}

/* 2 — SÖTÉT BAR */
.v-dark{background:rgba(11,20,36,.95);backdrop-filter:blur(12px)}
.v-dark .menu a{color:rgba(255,255,255,.85)}
.v-dark .menu a:hover{color:#fff}
.v-dark .brand img{filter:brightness(0) invert(1)}

/* 3 — FELSŐ INFOSÁV + MENÜ */
.v-topbar{background:#fff;box-shadow:0 6px 24px rgba(15,26,46,.08)}
.v-topbar .topbar{display:flex;justify-content:flex-end;gap:1.6rem;font-size:.78rem;color:rgba(15,26,46,.6);padding:.5rem clamp(1.5rem,5vw,4rem);border-bottom:1px solid rgba(15,26,46,.08);max-width:1280px;margin:0 auto;width:100%}
.v-topbar .topbar b{color:var(--accent);font-weight:600}
.v-topbar .nav-inner{padding-top:.7rem;padding-bottom:.7rem}

/* 4 — PILL MENÜ (lekerekített konténer, középen) */
.v-pill{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);box-shadow:0 6px 28px rgba(15,26,46,.09)}
.v-pill .menu{margin:0 auto;background:#fff;border:1px solid rgba(15,26,46,.1);border-radius:999px;padding:.55rem 1.4rem;box-shadow:0 4px 14px rgba(15,26,46,.06)}

/* 5 — ALÁHÚZÓS AKCENTUS (alsó vonal + aláhúzás) */
.v-underline{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:2px solid color-mix(in srgb,var(--accent) 30%,#fff)}
.v-underline .menu a::after{content:'';position:absolute;left:0;right:0;bottom:-6px;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .25s}
.v-underline .menu a:hover::after{transform:scaleX(1)}
.v-underline .menu a:first-child::after{transform:scaleX(1)}

@media(max-width:860px){header.site .menu{display:none}.v-topbar .topbar{display:none}}
</style>
</head>
<body>

<div class="picker">
  <div class="title">Fejléc ötlet</div>
  <button class="opt active" data-v="frosted">1 · Frosted (mostani)</button>
  <button class="opt" data-v="dark">2 · Sötét bar</button>
  <button class="opt" data-v="topbar">3 · Felső infosáv</button>
  <button class="opt" data-v="pill">4 · Pill menü</button>
  <button class="opt" data-v="underline">5 · Aláhúzós</button>
  <div class="opt-name">Kiválasztva: <b id="curName">1 · Frosted</b></div>
</div>

<header class="site v-frosted" id="hdr">
  <div class="topbar"><span>📞 <b>06-30-8-830-693</b></span><span>✉ szintersys@gmail.com</span><span>H–P 08:00–16:00</span></div>
  <div class="nav-inner">
    <a class="brand" href="#"><img src="images.html/logo-trans.png" alt="Szinter System Bt."></a>
    <nav class="menu">
      <a href="#">Rólunk</a><a href="#">Szolgáltatások</a><a href="#">Folyamat</a><a href="#">Referenciák</a><a href="#">Hol vagyunk</a><a href="#">GYIK</a><a href="#">Kapcsolat</a>
    </nav>
    <a href="#" class="nav-cta">Árajánlat</a>
  </div>
</header>

<div class="stage">
<section class="hero"><h1>Professzionális porfestés,<br><span class="accent">tartós védelem.</span></h1></section>
</div>

<script>
const hdr=document.getElementById('hdr'),curName=document.getElementById('curName');
document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.opt').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  hdr.className='site v-'+b.dataset.v;
  curName.textContent=b.textContent.trim();
}));
</script>
</body>
</html>
